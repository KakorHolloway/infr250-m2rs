apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prestashop
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
        - path: ''
          pathType: ImplementationSpecific
          backend:
            service:
              name: prestashop
              port:
                number: 80
  tls:
  - {}